org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Route Gradle downloads through the local v2ray proxy (Iran filtering); Google's
# own Maven 404s even via proxy, so the Aliyun google mirror is added to repos.
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=10808
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=10808
# Avoid a Kotlin incremental-cache close bug on Windows
kotlin.incremental=false
org.gradle.caching=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
